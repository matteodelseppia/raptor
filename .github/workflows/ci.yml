# .github/workflows/ci.yml
#
# CI matrix: build + test on all four toolchains, plus separate lint jobs.
# All jobs must pass before a PR can merge.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for the same branch/PR on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build + test matrix
  # ---------------------------------------------------------------------------
  build:
    name: build / ${{ matrix.name }}
    needs: [format-check, tidy]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux --------------------------------------------------------
          - name: linux-gcc16
            os: ubuntu-24.04
            preset: gcc-release
            install: |
              sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
              sudo apt-get update -qq
              sudo apt-get install -y gcc-16 g++-16 ninja-build

          - name: linux-clang22
            os: ubuntu-24.04
            preset: clang-release
            install: |
              wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
              echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
              sudo apt-get update -qq
              sudo apt-get install -y clang-22 ninja-build

          # ---- macOS (Apple Silicon) ----------------------------------------
          - name: macos-appleclang
            os: macos-15
            preset: appleclang-release
            install: |
              brew install ninja

          - name: macos-homebrew-clang
            os: macos-15
            preset: macos-homebrew-clang-release
            install: |
              brew install llvm ninja
              echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

          - name: macos-gcc
            os: macos-15
            preset: macos-gcc-release
            install: |
              brew install gcc ninja
              # Homebrew GCC ships as gcc-<N>; find the latest and symlink
              GCC_VER=$(ls /opt/homebrew/bin/gcc-* 2>/dev/null | grep -oE '[0-9]+$' | sort -n | tail -1)
              echo "Using Homebrew GCC ${GCC_VER}"
              sudo ln -sf /opt/homebrew/bin/gcc-${GCC_VER}  /usr/local/bin/gcc-14
              sudo ln -sf /opt/homebrew/bin/g++-${GCC_VER}  /usr/local/bin/g++-14

          # ---- Windows ------------------------------------------------------
          - name: windows-msvc
            os: windows-2022
            preset: msvc-release
            install: ""

          - name: windows-clang
            os: windows-2022
            preset: windows-clang-release
            install: |
              choco install llvm ninja --no-progress -y
              echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        if: matrix.name == 'windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install toolchain & Ninja (bash)
        if: matrix.install != '' && matrix.name != 'windows-clang'
        shell: bash
        run: ${{ matrix.install }}

      - name: Install toolchain & Ninja (PowerShell — windows-clang)
        if: matrix.name == 'windows-clang'
        shell: pwsh
        run: ${{ matrix.install }}

      - name: Install Ninja (Windows MSVC)
        if: matrix.name == 'windows-msvc'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: ~/.cmake/packages
          key: fetchcontent-${{ matrix.name }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            fetchcontent-${{ matrix.name }}-

      - name: Cache FetchContent source dir (cross-platform)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: fetchcontent-src-${{ matrix.name }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            fetchcontent-src-${{ matrix.name }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  # ---------------------------------------------------------------------------
  # Format check (clang-format 22, runs once)
  # No compilation needed — invoke clang-format directly on the sources.
  # ---------------------------------------------------------------------------
  format-check:
    name: lint / format-check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format-22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq
          sudo apt-get install -y clang-format-22

      - name: Run format-check
        run: |
          files=$(find src include tests -name '*.cpp' -o -name '*.hpp' -o -name '*.h' 2>/dev/null)
          if [ -z "$files" ]; then
            echo "No source files found — nothing to check."
            exit 0
          fi
          echo "$files" | xargs clang-format-22 --dry-run --Werror --style=file

  # ---------------------------------------------------------------------------
  # Clang-tidy (runs once, on the clang image)
  # ---------------------------------------------------------------------------
  tidy:
    name: lint / tidy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-22 + clang-tidy-22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq
          sudo apt-get install -y clang-22 clang-tidy-22 ninja-build python3

      - name: Cache FetchContent source dir
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: fetchcontent-src-linux-clang22-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            fetchcontent-src-linux-clang22-

      - name: Configure
        env:
          CC: clang-22
          CXX: clang++-22
        run: cmake --preset clang-release

      - name: Build (generates compile_commands.json)
        env:
          CC: clang-22
          CXX: clang++-22
        run: cmake --build --preset clang-release

      - name: Run tidy
        env:
          CC: clang-22
          CXX: clang++-22
        run: cmake --build --preset clang-release --target tidy
